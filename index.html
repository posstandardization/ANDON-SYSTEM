<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Andon System</title>
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #334155;
            --rtg-color: #3b82f6;
            --qc-color: #8b5cf6;
            --control-color: #f59e0b;
            --pareto-color: #10b981;
            --danger: #ef4444;
            --active-orange: #f97316;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--primary); color: white; min-height: 100vh; overflow-x: hidden; }

        /* Dashboard Layout (Replacing Full Screen Mode) */
        #homePage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }

        .home-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .home-header h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .home-header p {
            color: #94a3b8;
            font-size: 1.2rem;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 320px);
            gap: 25px;
            max-width: 1000px;
        }

        .big-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 220px; /* Fixed height for a balanced look */
            border: none;
            border-radius: 16px;
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .big-btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .big-btn:active { transform: scale(0.95); }
        .big-btn span { font-size: 1rem; margin-top: 12px; opacity: 0.9; font-weight: normal; }

        .btn-rtg { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .btn-qc { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); }
        .btn-control { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .btn-pareto { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 768px) {
            .button-grid {
                grid-template-columns: 1fr;
                width: 100%;
                max-width: 400px;
            }
            .home-header h1 { font-size: 2rem; }
            .big-btn { height: 180px; }
        }

        /* Overlay screens */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 10px;
        }

        .home-btn { 
            background: var(--danger); 
            color: white; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Forms */
        .login-card {
            max-width: 500px;
            margin: 60px auto;
            background: var(--secondary);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .login-card input, .login-card select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--accent);
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
        }

        /* Andon Terminal */
        .andon-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 220px);
        }

        .andon-section {
            background: var(--secondary);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .andon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            overflow-y: auto;
        }

        .andon-btn {
            aspect-ratio: 1.6/1;
            border: 2px solid var(--accent);
            background: var(--secondary);
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            padding: 8px;
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: background 0.2s;
        }

        .andon-btn.active {
            background: var(--active-orange) !important;
            border-color: white;
        }

        @keyframes blinker { 50% { opacity: 0.2; } }

        .close-bar {
            grid-column: span 2;
            height: 80px;
            margin-top: 15px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: not-allowed;
            text-transform: uppercase;
        }

        .close-bar.blinking {
            background: #eab308;
            color: black;
            cursor: pointer;
            animation: blinker 0.8s linear infinite;
        }

        /* Control Room Tables */
        .cr-section { margin-bottom: 40px; }
        .cr-section h2 { margin-bottom: 10px; color: var(--control-color); border-left: 5px solid; padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; background: var(--secondary); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--accent); }
        th { background: var(--accent); font-size: 0.9rem; }
        .blink-text { color: var(--danger); font-weight: bold; animation: blinker 1s infinite; }

        /* Pareto Page Layout */
        .pareto-layout { display: grid; grid-template-columns: 200px 1fr; gap: 20px; height: calc(100vh - 150px); }
        .pareto-sidebar { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-btn { 
            padding: 15px; border: none; background: var(--secondary); color: white; border-radius: 8px; 
            cursor: pointer; font-weight: bold; text-align: left; transition: 0.2s;
        }
        .sidebar-btn.active { background: var(--pareto-color); }
        
        .pareto-content { background: var(--secondary); border-radius: 12px; padding: 20px; position: relative; }
        .filter-ribbon { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .filter-ribbon select, .filter-ribbon input { padding: 8px; border-radius: 4px; background: var(--primary); color: white; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<!-- UPDATED HOME PAGE -->
<div id="homePage">
    <div class="home-header">
        <h1>PORT ANDON SYSTEM</h1>
        <p>Operational Terminal Monitoring & Fault Reporting</p>
    </div>
    
    <div class="button-grid">
        <button class="big-btn btn-rtg" onclick="openLogin('RTG')">
            RTG
            <span>Rubber Tired Gantry</span>
        </button>
        <button class="big-btn btn-qc" onclick="openLogin('QC')">
            QC
            <span>Quay Crane</span>
        </button>
        <button class="big-btn btn-control" onclick="showOverlay('controlRoom')">
            Control Room
            <span>Dual Monitoring</span>
        </button>
        <button class="big-btn btn-pareto" onclick="showOverlay('paretoView')">
            Pareto
            <span>Analytics & Logs</span>
        </button>
    </div>
</div>

<!-- ASSET LOGIN OVERLAY -->
<div id="loginOverlay" class="overlay">
    <div class="header-bar">
        <button class="home-btn" onclick="hideOverlay('loginOverlay')">🏠 HOME</button>
        <h1 id="loginTitle">ASSET LOGIN</h1>
        <div style="width:100px"></div>
    </div>
    <div class="login-card">
        <h2 id="loginSubtitle">OPERATOR ACCESS</h2>
        <input type="text" id="staffId" placeholder="Enter Staff ID">
        <select id="assetSelect"></select>
        <button id="loginActionBtn" class="big-btn" style="width: 100%; font-size: 1.5rem; height: 60px; margin-top: 20px;" onclick="enterConsole()">ENTER CONSOLE</button>
    </div>
</div>

<!-- ANDON CONSOLE OVERLAY -->
<div id="andonConsole" class="overlay">
    <div class="header-bar">
        <button class="home-btn" onclick="exitConsole()">🏠 HOME / LOGOUT</button>
        <h1 id="consoleTitle">CONSOLE</h1>
        <div style="width:100px"></div>
    </div>
    
    <div class="andon-container">
        <div class="andon-section">
            <h2>OPS ANDONS</h2>
            <div class="andon-grid" id="opsGrid"></div>
        </div>
        <div class="andon-section">
            <h2>TECH ANDONS</h2>
            <div class="andon-grid" id="techGrid"></div>
        </div>
        <button id="closeAndonBtn" class="close-bar" onclick="triggerCloseAndon()">CLOSE ANDON</button>
    </div>
</div>

<!-- CONTROL ROOM OVERLAY -->
<div id="controlRoom" class="overlay">
    <div class="header-bar">
        <button class="home-btn" onclick="hideOverlay('controlRoom')">🏠 HOME</button>
        <h1>CONTROL ROOM LIVE VIEW</h1>
        <div style="width:100px"></div>
    </div>

    <div class="cr-section">
        <h2>RTG LIVE ANDONS</h2>
        <table>
            <thead><tr><th>RTG</th><th>Staff</th><th>Fault Group</th><th>Raised Fault</th><th>Timer</th></tr></thead>
            <tbody id="rtgControlBody"></tbody>
        </table>
    </div>

    <div class="cr-section">
        <h2>QC LIVE ANDONS</h2>
        <table>
            <thead><tr><th>QC</th><th>Staff</th><th>Fault Group</th><th>Raised Fault</th><th>Timer</th></tr></thead>
            <tbody id="qcControlBody"></tbody>
        </table>
    </div>
</div>

<!-- PARETO VIEW OVERLAY -->
<div id="paretoView" class="overlay">
    <div class="header-bar">
        <button class="home-btn" onclick="hideOverlay('paretoView')">🏠 HOME</button>
        <h1>PARETO ANALYSIS CENTER</h1>
        <button onclick="downloadLog()" style="background: var(--pareto-color); border: none; padding: 10px 20px; color: white; border-radius: 4px; cursor: pointer; font-weight: bold;">📥 EXCEL LOG</button>
    </div>

    <div class="pareto-layout">
        <div class="pareto-sidebar">
            <button id="sideBtnRTG" class="sidebar-btn active" onclick="setParetoMode('RTG')">RTG ANALYSIS</button>
            <button id="sideBtnQC" class="sidebar-btn" onclick="setParetoMode('QC')">QC ANALYSIS</button>
        </div>
        <div class="pareto-content">
            <div class="filter-ribbon">
                <select id="pTimeFilter" onchange="renderPareto()">
                    <option value="live">Live / Session</option>
                    <option value="24h">Last 24 Hours</option>
                </select>
                <select id="pAssetFilter" onchange="renderPareto()">
                    <option value="All">All Units</option>
                </select>
                <input type="date" id="pDateFilter" onchange="renderPareto()">
            </div>
            <div style="height: 400px; width: 100%;">
                <canvas id="pChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Data Definitions ---
    const config = {
        RTG: {
            range: [33, 128],
            prefix: 'RTG',
            ops: ["NO TT", "NO JOB TO DO", "GANTRY", "WHEELTURN", "ACCIDENT", "CONTAINER ALIGNMENT", "OTHERS"],
            tech: ["HOIST FAULT", "SPREADER FAULT", "TROLLEY FAULT", "GANTRY FAULT", "CONTROL/POWER", "TRIM/SKEW", "OTHER"]
        },
        QC: {
            range: [8, 36],
            prefix: 'QC',
            ops: ["WAITING FOR TT", "WAITING FOR SAFETY CAGE", "WAITING FOR OHF", "ACCIDENT", "CONNECTING WIRE SLING", "JAMMED TWISTLOCK", "WAITING FOR GEAR BOX", "DAMAGED CONTAINER", "LASHING", "UNLASHING"],
            tech: ["HOIST FAULT", "SPREADER FAULT", "GANTRY FAULT", "CONTROL/POWER", "SKEW/TRIM", "TROLLEY", "SPEED", "OTHER FAULTS"]
        }
    };

    let appMode = 'RTG'; // Current mode during login/console
    let currentAsset = null;
    let currentStaff = null;
    let pMode = 'RTG'; // Pareto view mode

    // State Persistence
    let activeAndons = JSON.parse(localStorage.getItem('port_active')) || [];
    let logs = JSON.parse(localStorage.getItem('port_logs')) || [];

    // --- Initialization ---
    window.onload = () => {
        updateControlRoomTables();
        setInterval(updateTimers, 1000);
    };

    function showOverlay(id) { 
        document.getElementById(id).style.display = 'block'; 
        if(id === 'controlRoom') updateControlRoomTables();
        if(id === 'paretoView') { setParetoMode('RTG'); }
    }
    function hideOverlay(id) { document.getElementById(id).style.display = 'none'; }

    // --- Login Logic ---
    function openLogin(mode) {
        appMode = mode;
        const title = document.getElementById('loginTitle');
        const subtitle = document.getElementById('loginSubtitle');
        const select = document.getElementById('assetSelect');
        const btn = document.getElementById('loginActionBtn');

        title.innerText = `${mode} OPERATOR LOGIN`;
        subtitle.innerText = `${mode} ACCESS PANEL`;
        btn.style.backgroundColor = mode === 'RTG' ? 'var(--rtg-color)' : 'var(--qc-color)';
        
        select.innerHTML = '';
        const [start, end] = config[mode].range;
        for(let i = start; i <= end; i++) {
            const val = i < 10 ? `0${i}` : i;
            const text = `${config[mode].prefix} ${val}`;
            select.add(new Option(text, text));
        }

        showOverlay('loginOverlay');
    }

    function enterConsole() {
        currentStaff = document.getElementById('staffId').value;
        currentAsset = document.getElementById('assetSelect').value;
        if(!currentStaff) return alert("Please enter Staff ID");

        document.getElementById('consoleTitle').innerText = `${currentAsset} | Staff: ${currentStaff}`;
        initAndonGrids();
        hideOverlay('loginOverlay');
        showOverlay('andonConsole');
        refreshConsoleUI();
    }

    function exitConsole() {
        currentAsset = null;
        currentStaff = null;
        hideOverlay('andonConsole');
    }

    // --- Andon Console Logic ---
    function initAndonGrids() {
        const opsGrid = document.getElementById('opsGrid');
        const techGrid = document.getElementById('techGrid');
        opsGrid.innerHTML = '';
        techGrid.innerHTML = '';

        const data = config[appMode];
        data.ops.forEach(fault => createBtn(fault, 'OPS', opsGrid));
        data.tech.forEach(fault => createBtn(fault, 'TECH', techGrid));
    }

    function createBtn(fault, group, container) {
        const b = document.createElement('button');
        b.className = 'andon-btn';
        b.innerText = fault;
        b.onclick = () => raiseAndon(fault, group);
        container.appendChild(b);
    }

    function raiseAndon(fault, group) {
        if(activeAndons.some(a => a.asset === currentAsset)) return;

        const entry = {
            id: Date.now(),
            mode: appMode,
            asset: currentAsset,
            staff: currentStaff,
            group: group,
            fault: fault,
            start: new Date().getTime()
        };

        activeAndons.push(entry);
        saveState();
        refreshConsoleUI();
    }

    function refreshConsoleUI() {
        const active = activeAndons.find(a => a.asset === currentAsset);
        const closeBtn = document.getElementById('closeAndonBtn');
        
        document.querySelectorAll('.andon-btn').forEach(b => b.classList.remove('active'));

        if(active) {
            document.querySelectorAll('.andon-btn').forEach(b => {
                if(b.innerText === active.fault) b.classList.add('active');
            });
            closeBtn.classList.add('blinking');
        } else {
            closeBtn.classList.remove('blinking');
        }
    }

    function triggerCloseAndon() {
        const idx = activeAndons.findIndex(a => a.asset === currentAsset);
        if(idx === -1) return;

        const closed = activeAndons.splice(idx, 1)[0];
        const end = new Date().getTime();

        logs.push({
            ...closed,
            end: end,
            duration: Math.floor((end - closed.start) / 1000)
        });

        saveState();
        refreshConsoleUI();
    }

    function saveState() {
        localStorage.setItem('port_active', JSON.stringify(activeAndons));
        localStorage.setItem('port_logs', JSON.stringify(logs));
    }

    // --- Control Room Logic ---
    function updateControlRoomTables() {
        const rtgBody = document.getElementById('rtgControlBody');
        const qcBody = document.getElementById('qcControlBody');
        rtgBody.innerHTML = '';
        qcBody.innerHTML = '';

        activeAndons.forEach(a => {
            const row = `<tr>
                <td>${a.asset}</td>
                <td>${a.staff}</td>
                <td>${a.group}</td>
                <td class="blink-text">${a.fault}</td>
                <td id="timer-${a.id}">--</td>
            </tr>`;
            if(a.mode === 'RTG') rtgBody.innerHTML += row;
            else qcBody.innerHTML += row;
        });
    }

    function updateTimers() {
        activeAndons.forEach(a => {
            const el = document.getElementById(`timer-${a.id}`);
            if(el) {
                const diff = Math.floor((new Date().getTime() - a.start) / 1000);
                const m = Math.floor(diff / 60);
                const s = diff % 60;
                el.innerText = `${m}m ${s}s`;
            }
        });
    }

    // --- Pareto Logic ---
    let myChart;
    function setParetoMode(mode) {
        pMode = mode;
        document.getElementById('sideBtnRTG').classList.toggle('active', mode === 'RTG');
        document.getElementById('sideBtnQC').classList.toggle('active', mode === 'QC');
        
        // Update asset dropdown
        const filter = document.getElementById('pAssetFilter');
        filter.innerHTML = '<option value="All">All Units</option>';
        const [start, end] = config[mode].range;
        for(let i=start; i<=end; i++) {
            const val = i < 10 ? `0${i}` : i;
            const text = `${config[mode].prefix} ${val}`;
            filter.add(new Option(text, text));
        }
        renderPareto();
    }

    function renderPareto() {
        const timeFilter = document.getElementById('pTimeFilter').value;
        const assetFilter = document.getElementById('pAssetFilter').value;
        const dateFilter = document.getElementById('pDateFilter').value;

        const now = new Date().getTime();
        const hrs24 = 24 * 60 * 60 * 1000;

        let filtered = logs.filter(l => l.mode === pMode);

        if(timeFilter === '24h') {
            filtered = filtered.filter(l => (now - l.start) <= hrs24);
        } else if (timeFilter === 'live') {
            filtered = filtered.filter(l => (now - l.start) <= (4 * 60 * 60 * 1000));
        }

        if(assetFilter !== 'All') {
            filtered = filtered.filter(l => l.asset === assetFilter);
        }

        if(dateFilter) {
            filtered = filtered.filter(l => new Date(l.start).toISOString().split('T')[0] === dateFilter);
        }

        const counts = {};
        filtered.forEach(f => counts[f.fault] = (counts[f.fault] || 0) + 1);

        const labels = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
        const data = labels.map(l => counts[l]);

        if(myChart) myChart.destroy();
        const ctx = document.getElementById('pChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: `Frequency of ${pMode} Faults`,
                    data: data,
                    backgroundColor: pMode === 'RTG' ? '#3b82f6' : '#8b5cf6'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: 'white' } },
                    x: { ticks: { color: 'white' } }
                },
                plugins: { legend: { labels: { color: 'white' } } }
            }
        });
    }

    function downloadLog() {
        if(logs.length === 0) return alert("No history available to download.");
        const exportData = logs.map(l => ({
            "CATEGORY": l.mode,
            "ASSET NO": l.asset,
            "STAFF ID": l.staff,
            "FAULT GROUP": l.group,
            "FAULT DESCRIPTION": l.fault,
            "RAISED TIME": new Date(l.start).toLocaleString(),
            "CLOSED TIME": new Date(l.end).toLocaleString(),
            "DURATION (SEC)": l.duration
        }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Andon Log");
        XLSX.writeFile(wb, "Port_Andon_Report.xlsx");
    }
</script>
</body>
</html>
